# Fichier temporaire pour tester uniquement la partie storage
# Le docker-compose.yml final sera géré par Korniti (Rôle 6)

services:

  minio:
    image: minio/minio:latest
    container_name: hackathon-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file: .env
    volumes:
      - minio_data:/data

  mongo:
    image: mongo:7
    container_name: hackathon-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  storage-init:
    build: ./storage
    container_name: hackathon-storage-init
    depends_on:
      - minio
      - mongo
    env_file: .env

volumes:
  minio_data:
  mongo_data: